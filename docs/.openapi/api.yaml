                type: array
                items:
                  $ref: '#/components/schemas/LicenseDto'
  /api/v1/identifier/retrieve:
    get:
      tags:
        - identifier-endpoint
      summary: Retrieve PID metadata
      description: >-
        Retrieves Persistent Identifier (PID) metadata from external endpoints.
        Supported PIDs are: ORCID, ROR, DOI.
      operationId: retrieve
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retrieved metadata from identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentifierDto'
        '404':
          description: Failed to find metadata for identifier
  '/api/v1/database/{databaseId}':
    get:
      tags:
        - database-endpoint
      summary: Find database
      description: Finds a database with id.
      operationId: findById_2
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Database found successfully
          headers:
            X-Username:
              description: The authentication username
              style: simple
              schema:
                type: string
            Access-Control-Expose-Headers:
              description: Expose custom headers
              style: simple
              schema:
                type: string
            X-Password:
              description: The authentication password
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseBriefDto'
        '403':
          description: Not allowed to view database
        '404':
          description: Database could not be found
      security:
        - bearerAuth: []
        - basicAuth: []
  '/api/v1/database/{databaseId}/table/{tableId}/suggest':
    get:
      tags:
        - table-endpoint
      summary: Suggest semantics
      description: >-
        Suggests semantic concepts for a table. This action can only be
        performed by the table owner. Requires role `table-semantic-analyse`.
      operationId: analyseTable
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Suggested table semantics successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EntityDto'
        '400':
          description: Failed to parse statistic in search service
        '403':
          description: Not the table owner.
        '404':
          description: Failed to find database/table in metadata database
        '417':
          description: Generated query is malformed
        '422':
          description: Ontology does not have rdf or sparql endpoint
      security:
        - bearerAuth: []
        - basicAuth: []
  '/api/v1/database/{databaseId}/table/{tableId}/column/{columnId}/suggest':
    get:
      tags:
        - table-endpoint
      summary: Suggest semantics
      description: Suggests column semantics. Requires role `table-semantic-analyse`.
      operationId: analyseTableColumn
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: columnId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Suggested table column semantics successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TableColumnEntityDto'
        '400':
          description: Generated query is malformed
        '404':
          description: Failed to find database/table in metadata database
        '422':
          description: Ontology does not have rdf or sparql endpoint
      security:
        - bearerAuth: []
        - basicAuth: []
  '/api/v1/container/{containerId}':
    get:
      tags:
        - container-endpoint
      summary: Find container
      description: Finds a container in the metadata database.
      operationId: findById_3
      parameters:
        - name: containerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Found container
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerDto'
        '404':
          description: Container image could not be found
    delete:
      tags:
        - container-endpoint
      summary: Delete container
      description: >-
        Deletes a container in the metadata database. Requires role
        `delete-container`.
      operationId: delete_6
      parameters:
        - name: containerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Deleted container
        '403':
          description: 'Create container not permitted, need authority `delete-container`'
        '404':
          description: Container not found
      security:
        - bearerAuth: []
        - basicAuth: []
  /api/v1/concept:
    get:
      tags:
        - concept-endpoint
      summary: List concepts
      description: List all semantic concepts known to the metadata database
      operationId: findAll_7
      responses:
        '200':
          description: List concepts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConceptDto'
  /api/v1/search:
    get:
      consumes:
        - application/json
      description: Performs a fuzzy search
      operationId: post_fuzzy_search
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      produces:
        - application/json
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: string
                type: array
          description: 'OK, contains the elements formatted as an array of JSON arrays'
        '415':
          description: Wrong accept type
      summary: Performs a fuzzy search
      tags:
        - search-endpoint
  '/api/v1/search/{field_type}':
    post:
      consumes:
        - application/json
      description: Performs a general search
      operationId: post_general_search
      parameters:
        - description: The search type.
          in: path
          name: type
          required: true
          schema:
            enum:
              - database
              - table
              - view
              - column
              - user
              - identifier
              - concept
              - unit
            type: string
        - in: query
          name: t1
          schema:
            type: integer
        - in: query
          name: t2
          schema:
            type: integer
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/components/schemas/SearchRequestDto'
      produces:
        - application/json
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  results:
                    items:
                      type: object
                    type: array
                  type:
                    description: Same as the requested type
                    enum:
                      - database
                      - table
                      - view
                      - column
                      - user
                      - identifier
                      - concept
                      - unit
                    type: string
                type: object
          description: 'OK, contains the elements formatted as an array of JSON arrays'
      summary: Performs a general search
      tags:
        - search-endpoint
  '/api/v1/search/{field_type}/fields':
    get:
      operationId: get_fields
      parameters:
        - description: The search type.
          in: path
          name: type
          required: true
          schema:
            enum:
              - database
              - table
              - view
              - column
              - user
              - identifier
              - concept
              - unit
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexFieldsDto'
          description: List of fields
        '404':
          description: Invalid type.
      summary: Get searchable fields
      tags:
        - search-endpoint
  '/api/v1/search/{index}':
    get:
      consumes:
        - application/json
      description: Gets the index
      operationId: get_index
      parameters:
        - description: The search type.
          in: path
          name: type
          required: true
          schema:
            enum:
              - database
              - table
              - view
              - column
              - user
              - identifier
              - concept
              - unit
            type: string
        - in: body
          name: body
          required: true
          schema:
            properties:
              field_value_pairs:
                type: object
              search_term:
                example: air quality
                type: string
              t1:
                example: 0
                type: integer
              t2:
                example: 100
                type: integer
            type: object
      produces:
        - application/json
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexDto'
          description: 'OK, contains the elements formatted as an array of JSON arrays'
      summary: Gets the index
      tags:
        - search-endpoint
components:
  securitySchemes:
    basicAuth:
      in: header
      scheme: basic
      type: http
    bearerAuth:
      bearerFormat: JWT
      in: header
      scheme: bearer
      type: http
  schemas:
    DatabaseAccessDto:
      type: object
      properties:
        username:
          type: string
          description: The user name
          example: foobar
        user:
          $ref: '#/components/schemas/UserBriefDto'
        type:
          type: string
          enum:
            - read
            - write_own
            - write_all
          example: read
      required:
        - type
        - user
        - username
    UserBriefDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 1ffc7b0e-9aeb-4e8b-b8f1-68f3936155b4
        username:
          type: string
          description: Only contains lowercase characters
          example: jcarberry
        name:
          type: string
          example: Josiah Carberry
        orcid:
          type: string
          example: 0000-0002-1825-0097
        qualified_name:
          type: string
          example: Josiah Carberry — @jcarberry
        given_name:
          type: string
          example: Josiah
        family_name:
          type: string
          example: Carberry
      required:
        - username
    TupleUpdateDto:
      type: object
      properties:
        data:
          type: object
          additionalProperties:
            type: object
          description: The key-value data map
          example:
            key: value
        keys:
          type: object
          additionalProperties:
            type: object
          description: The map of conditions
          example:
            id: 1
      required:
        - data
        - keys
    QueryPersistDto:
      type: object
      properties:
        persist:
          type: boolean
          description: 'If false, the query is marked for deletion at a later point in time'
          example: true
      required:
        - persist
    CreatorBriefDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: e41f94a6-2b94-4a12-ac0e-678684e1c070
        affiliation:
          type: string
          example: Brown University
        creator_name:
          type: string
          example: 'Carberry, Josiah'
        name_type:
          type: string
          enum:
            - Personal
            - Organizational
          example: Personal
        name_identifier:
          type: string
          example: 0000-0002-1825-0097
        name_identifier_scheme:
          type: string
          enum:
            - ORCID
            - ROR
            - ISNI
            - GRID
          example: ORCID
        affiliation_identifier:
          type: string
          example: 'https://ror.org/05gq02987'
        affiliation_identifier_scheme:
          type: string
          enum:
            - ROR
            - GRID
            - ISNI
          example: ROR
      required:
        - creator_name
        - id
    IdentifierBriefDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b97cd56b-66ca-4354-9e6c-f47210cfaaec
        type:
          type: string
          enum:
            - database
            - subset
            - table
            - view
          example: database
        creators:
          type: array
          items:
            $ref: '#/components/schemas/CreatorBriefDto'
        titles:
          type: array
          items:
            $ref: '#/components/schemas/IdentifierTitleDto'
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/IdentifierDescriptionDto'
        doi:
          type: string
          example: 10.1038/nphys1170
        publisher:
          type: string
          example: TU Wien
        status:
          type: string
          enum:
            - draft
            - published
          example: draft
        created:
          type: string
          format: date-time
        database_id:
          type: string
          format: uuid
          example: fc29f89c-86a8-4020-9e36-4d954736c6cc
        query_id:
          type: string
          format: uuid
          example: 1413e257-f62a-4881-ac38-ae9a76e21b9c
        table_id:
          type: string
          format: uuid
          example: 67d23209-aec8-489a-8f86-71fd0fe09ce7
        view_id:
          type: string
          format: uuid
          example: 8f860779-3ab1-4f83-ae6c-b89ebbf1dcc4
        publication_year:
          type: integer
          format: int32
          example: 2022
        owned_by:
          type: string
          description: The owner username
          example: foobar
      required:
        - creators
        - database_id
        - descriptions
        - id
        - owned_by
