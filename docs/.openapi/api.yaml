    ColumnAnalysisResultDto:
      type: object
      properties:
        name:
          type: string
          description: The column name
          example: age
        datatype:
          type: string
          description: The column data type
          enum:
            - char
            - varchar
            - binary
            - varbinary
            - tinyblob
            - tinytext
            - text
            - blob
            - mediumtext
            - mediumblob
            - longtext
            - longblob
            - enum
            - set
            - serial
            - bit
            - tinyint
            - bool
            - smallint
            - mediumint
            - int
            - bigint
            - float
            - double
            - decimal
            - date
            - datetime
            - timestamp
            - time
            - year
          example: BIGINT
        size:
          type: integer
          format: int32
          description: >-
            The size determines the number of digits before the comma: x=size-d
            where size >= d
          example: 20
        d:
          type: integer
          format: int32
          description: The digits behind the comma
          example: 10
        enums:
          type: array
          description: The list of enumerations detected
          example: []
          items:
            type: string
        sets:
          type: array
          description: The list of set values detected
          example: []
          items:
            type: string
        null_allowed:
          type: boolean
          description: 'If set to true, the column value can be null'
          example: true
        primary_key:
          type: boolean
          description: The column is a candidate to be part of a composite primary key
          example: true
      required:
        - datatype
        - name
    SchemaAnalysisResultDto:
      type: object
      properties:
        delimiter:
          type: string
          description: The column delimiter of the dataset
          example: ','
        quote:
          type: string
          description: The quote symbol around values in the dataset
          example: '"'
        escape:
          type: string
          description: The escape symbol
          example: \
        comment:
          type: string
          description: The comment symbol
          example: '#'
        columns:
          type: array
          description: The list of columns analyzed
          example: '["name":"VARCHAR","age":"BIGINT"]'
          items:
            $ref: '#/components/schemas/ColumnAnalysisResultDto'
        newline_delimiter:
          type: string
          description: The newline symbol
          example: \n
        skip_rows:
          type: integer
          format: int32
          description: The number of rows to skip
          example: '#'
        has_header:
          type: boolean
          description: Detected the first line as header
          example: true
        date_format:
          type: string
          description: The format of the date
          example: '%d/%m/%Y'
        timestamp_format:
          type: string
          description: The format of the timestamp
          example: '%Y-%m-%dT%H:%M:%S.%f'
      required:
        - columns
        - comment
        - delimiter
        - escape
        - has_header
        - newline_delimiter
        - quote
        - skip_rows
