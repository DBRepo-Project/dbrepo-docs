          type: integer
          format: int64
          description: >-
            The size determines the number of digits before the comma: x=size-d
            where size >= d
          example: null
        d:
          type: integer
          format: int64
          description: The digits behind the comma
          example: null
        description:
          type: string
          description: The column comment
          example: null
          maxLength: 2048
          minLength: 0
