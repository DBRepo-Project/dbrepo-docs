            "example": {
              "key": "value"
            }
          }
        },
        "required": [
          "data"
        ]
      },
      "ImportDto": {
        "type": "object",
        "properties": {
          "location": {
            "type": "string",
            "description": "The key of the S3 binary object in the storage service",
            "example": "file.csv"
          },
          "header": {
            "type": "boolean",
            "description": "If true, the first line contains the column names, otherwise it contains only data",
            "example": true
          },
          "separator": {
            "type": "string",
            "description": "The column delimiter of the dataset",
            "example": ","
          },
          "quote": {
            "type": "string",
            "description": "The quote symbol around values in the dataset",
            "example": "\""
          },
          "line_termination": {
            "type": "string",
            "description": "The newline symbol",
            "example": "\\n"
          }
        },
        "required": [
          "header",
          "location",
          "separator"
        ]
      },
      "FilterDto": {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
