        "operationId": "delete",
        "parameters": [
          {
            "name": "ontologyId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "202": {
            "description": "Deleted ontology successfully",
            "content": {
              "application/json": {}
            }
          },
          "404": {
            "description": "Could not find ontology",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiErrorDto"
