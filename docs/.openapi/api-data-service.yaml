      "QueryDto": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid",
            "description": "The query id",
            "example": "83ea2326-f8f6-4263-baf8-cdf88a54efc7"
          },
          "owner": {
            "$ref": "#/components/schemas/UserBriefDto"
          },
          "execution": {
            "type": "string",
            "format": "date-time",
            "description": "The timestamp when the query was executed",
            "example": "2022-01-01 08:00:00.000000"
          },
          "query": {
            "type": "string",
            "description": "The mapped SQL query",
            "example": "SELECT `id` FROM `air_quality`"
          },
          "type": {
            "type": "string",
            "description": "The query type",
            "enum": [
              "query",
              "view"
            ],
            "example": "query"
          },
          "identifiers": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/IdentifierBriefDto"
            }
          },
          "database_id": {
            "type": "string",
            "format": "uuid",
            "description": "The database id",
            "example": "1a6fb0c0-49c3-4a22-a515-35f7a3dd8e62"
          },
          "query_normalized": {
            "type": "string",
            "description": "The normalized SQL query as executed",
            "example": "SELECT `id` FROM `air_quality` FOR SYSTEM_TIME AS OF TIMESTAMP '2022-01-01 08:00:00.000000'"
          },
          "query_hash": {
            "type": "string",
            "description": "The sha256-hash of the mapped query",
            "example": "17e682f060b5f8e47ea04c5c4855908b0a5ad612022260fe50e11ecb0cc0ab76"
          },
          "result_hash": {
            "type": "string",
            "description": "The sha256-hash of the result",
            "example": "17e682f060b5f8e47ea04c5c4855908b0a5ad612022260fe50e11ecb0cc0ab76"
          },
          "result_number": {
            "type": "integer",
            "format": "int64",
            "description": "The row count of the result",
            "example": 1
          },
          "is_persisted": {
            "type": "boolean",
            "description": "If false, the query is marked for deletion at a later point in time",
            "example": true
          }
        },
        "required": [
          "database_id",
          "execution",
          "id",
          "identifiers",
          "is_persisted",
          "owner",
          "query",
          "query_hash",
          "query_normalized"
        ]
      },
