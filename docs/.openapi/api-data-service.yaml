    "/api/v1/database/{databaseId}/subset/{subsetId}/data": {
      "get": {
        "tags": [
          "subset-endpoint"
        ],
        "summary": "Get subset data",
        "description": "Gets data of subset with id. For private databases, the user needs at least *READ* grant to the associated database. Requests with HTTP method **GET** return the subset dataset. Requests with HTTP method **HEAD** only the number of rows in the subset dataset in the `X-Count` header, the subset id in the `X-Id` header and the `sha256`-result set hash in the `X-Result-Hash` header. Requests with HTTP method **GET** additionally return the result set in the response body.",
        "operationId": "getData_4",
        "parameters": [
          {
            "name": "databaseId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          },
          {
            "name": "subsetId",
            "in": "path",
            "required": true,
