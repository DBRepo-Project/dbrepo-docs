            "example": "read"
          }
        },
        "required": [
          "type",
          "user"
        ]
      },
      "UserBriefDto": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid",
            "example": "1ffc7b0e-9aeb-4e8b-b8f1-68f3936155b4"
          },
          "username": {
            "type": "string",
            "description": "Only contains lowercase characters",
            "example": "jcarberry"
          },
          "name": {
            "type": "string",
            "example": "Josiah Carberry"
          },
          "orcid": {
            "type": "string",
            "example": "0000-0002-1825-0097"
          },
          "qualified_name": {
            "type": "string",
            "example": "Josiah Carberry — @jcarberry"
          },
          "given_name": {
            "type": "string",
            "example": "Josiah"
          },
          "family_name": {
            "type": "string",
            "example": "Carberry"
