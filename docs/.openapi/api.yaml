openapi: 3.0.3
info:
  contact:
    email: andreas.rauber@tuwien.ac.at
    name: Prof. Andreas Rauber
  description: >
    The merged REST API of DBRepo for users, developers and data stewards to be
    accessed publicly. Have a look at

    the [source
    code](https://gitlab.phaidra.org/fair-data-austria-db-repository/fda-services)
    for non-public endpoints

    that are used between the services themselves.
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0'
  title: REST API
  version: 1.12.1
servers:
  - description: Test Instance
    url: 'https://test.dbrepo.tuwien.ac.at'
  - description: Local Instance
    url: 'http://localhost'
externalDocs:
  description: Project Website
  url: 'https://www.ifs.tuwien.ac.at/infrastructures/dbrepo/1.12/'
paths:
  '/api/v1/database/{databaseId}/view/{viewId}/data':
    get:
      tags:
        - view-endpoint
      summary: Get view data
      description: >-
        Gets data from a view of a database. For private databases, the user
        needs at least *READ* access to the associated database.
      operationId: getData
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: viewId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: Accept
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retrieved view data
          headers:
            Access-Control-Expose-Headers:
              description: Expose `X-Count` custom header
              required: true
              style: simple
              schema:
                type: string
            X-Count:
              description: Number of rows
              required: true
              style: simple
              schema:
                type: integer
                format: int64
          content:
            application/json:
              schema:
                type: string
            text/csv: {}
        '400':
          description: Request pagination is malformed
        '403':
          description: Not allowed to retrieve view data
        '404':
          description: Failed to find view in metadata database
        '406':
          description: Failed to format data
        '409':
          description: View schema could not be mapped
        '503':
          description: Failed to establish connection with the metadata service
      security:
        - basicAuth: []
        - bearerAuth: []
    head:
      tags:
        - view-endpoint
      summary: Get view data
      description: >-
        Gets data from a view of a database. For private databases, the user
        needs at least *READ* access to the associated database.
      operationId: getData_1
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: viewId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: Accept
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retrieved view data
          headers:
            Access-Control-Expose-Headers:
              description: Expose `X-Count` custom header
              required: true
              style: simple
              schema:
                type: string
            X-Count:
              description: Number of rows
              required: true
              style: simple
              schema:
                type: integer
                format: int64
          content:
            application/json:
              schema:
                type: string
            text/csv: {}
        '400':
          description: Request pagination is malformed
        '403':
          description: Not allowed to retrieve view data
        '404':
          description: Failed to find view in metadata database
        '406':
          description: Failed to format data
        '409':
          description: View schema could not be mapped
        '503':
          description: Failed to establish connection with the metadata service
      security:
        - basicAuth: []
        - bearerAuth: []
  '/api/v1/database/{databaseId}/table/{tableId}/data':
    get:
      tags:
        - table-endpoint
      summary: Get table data
      description: >-
        Gets data from a table with id. For a table in a private database, the
        user needs to have at least *READ* access to the associated database.
        Requests with HTTP method **GET** return the full dataset, requests with
        HTTP method **HEAD** only the number of tuples in the `X-Count` header.
      operationId: getData_2
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: Accept
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Get table data
          headers:
            Access-Control-Expose-Headers:
              description: Expose `X-Count` custom header
              required: true
              style: simple
              schema:
                type: string
            X-Count:
              description: Number of rows
              required: true
              style: simple
              schema:
                type: integer
                format: int64
          content:
            application/json:
              schema:
                type: string
            text/csv: {}
        '400':
          description: Request pagination or table data select query is malformed
        '403':
          description: Not allowed to get table data
        '404':
          description: Failed to find table in metadata database
        '406':
          description: Failed to format data
        '503':
          description: Failed to establish connection with the metadata service
      security:
        - basicAuth: []
        - bearerAuth: []
    put:
      tags:
        - table-endpoint
      summary: Update tuple
      description: >-
        Updates a data tuple into a table, then the table statistics are
        updated. The user needs to have at least *WRITE_OWN* access to the
        associated database. Requires role `insert-table-data`.
      operationId: updateRawTuple
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TupleUpdateDto'
        required: true
      responses:
        '202':
          description: Updated table data
        '400':
          description: Request pagination or table data select query is malformed
        '403':
          description: Update table data not allowed
        '404':
          description: Failed to find table in metadata database
        '503':
          description: Failed to establish connection with the metadata service
      security:
        - basicAuth: []
        - bearerAuth: []
    post:
      tags:
        - table-endpoint
      summary: Insert tuple
      description: >-
        Inserts a data tuple into a table, then the table statistics are
        updated. The user needs to have at least *WRITE_OWN* access to the
        associated database. Requires role `insert-table-data`.
      operationId: insertRawTuple
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TupleDto'
        required: true
      responses:
        '201':
          description: Created table data
        '400':
          description: Request pagination or table data select query is malformed
        '403':
          description: Create table data not allowed
        '404':
          description: Failed to find table in metadata database or blob in storage service
        '503':
          description: >-
            Failed to establish connection with the metadata service or storage
            service
      security:
        - basicAuth: []
        - bearerAuth: []
    delete:
      tags:
        - table-endpoint
      summary: Delete tuple
      description: >-
        Deletes a data tuple into a table, then the table statistics are
        updated. The user needs to have at least *WRITE_OWN* access to the
        associated database. Requires role `delete-table-data`.
      operationId: deleteRawTuple
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TupleDeleteDto'
        required: true
      responses:
        '202':
          description: Deleted table data
        '400':
          description: Request pagination or table data select query is malformed
        '403':
          description: Delete table data not allowed
        '404':
          description: Failed to find table in metadata database
        '503':
          description: Failed to establish connection with the metadata service
      security:
        - basicAuth: []
        - bearerAuth: []
    head:
      tags:
        - table-endpoint
      summary: Get table data
      description: >-
        Gets data from a table with id. For a table in a private database, the
        user needs to have at least *READ* access to the associated database.
        Requests with HTTP method **GET** return the full dataset, requests with
        HTTP method **HEAD** only the number of tuples in the `X-Count` header.
      operationId: getData_3
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: Accept
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Get table data
          headers:
            Access-Control-Expose-Headers:
              description: Expose `X-Count` custom header
              required: true
              style: simple
              schema:
                type: string
            X-Count:
              description: Number of rows
              required: true
              style: simple
              schema:
                type: integer
                format: int64
          content:
            application/json:
              schema:
                type: string
            text/csv: {}
        '400':
          description: Request pagination or table data select query is malformed
        '403':
          description: Not allowed to get table data
        '404':
          description: Failed to find table in metadata database
        '406':
          description: Failed to format data
        '503':
          description: Failed to establish connection with the metadata service
      security:
        - basicAuth: []
        - bearerAuth: []
  '/api/v1/database/{databaseId}/subset/{subsetId}/data':
    get:
      tags:
        - subset-endpoint
      summary: Get subset data
      description: >-
        Gets data of subset with id. For private databases, the user needs at
        least *READ* grant to the associated database. Requests with HTTP method
        **GET** return the subset dataset. Requests with HTTP method **HEAD**
        only the number of rows in the subset dataset in the `X-Count` header,
        the subset id in the `X-Id` header and the `sha256`-result set hash in
        the `X-Result-Hash` header. Requests with HTTP method **GET**
        additionally return the result set in the response body.
      operationId: getData_4
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: subsetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Accept
          in: header
          required: true
          schema:
            type: string
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Retrieved subset data
          headers:
            Access-Control-Expose-Headers:
              description: Reverse proxy exposing of custom headers
              required: true
              style: simple
              schema:
                type: string
            X-Count:
              description: Number of result set rows
              style: simple
              schema:
                type: integer
                format: int64
            X-Id:
              description: The subset id
              required: true
              style: simple
              schema:
                type: string
                format: uuid
            X-Headers:
              description: The list of headers separated by comma
              style: simple
              schema:
                type: string
            X-Result-Hash:
              description: Hash of result set
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                type: string
            text/csv: {}
        '400':
          description: Invalid pagination
        '403':
          description: Not allowed to retrieve subset data
        '404':
          description: >-
            Failed to find database in metadata database or query in query store
            of the data database
        '406':
          description: Failed to format data
        '503':
          description: Failed to communicate with database
      security:
        - bearerAuth: []
        - basicAuth: []
    head:
      tags:
        - subset-endpoint
      summary: Get subset data
      description: >-
        Gets data of subset with id. For private databases, the user needs at
        least *READ* grant to the associated database. Requests with HTTP method
        **GET** return the subset dataset. Requests with HTTP method **HEAD**
        only the number of rows in the subset dataset in the `X-Count` header,
        the subset id in the `X-Id` header and the `sha256`-result set hash in
        the `X-Result-Hash` header. Requests with HTTP method **GET**
        additionally return the result set in the response body.
      operationId: getData_5
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: subsetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Accept
          in: header
          required: true
          schema:
            type: string
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Retrieved subset data
          headers:
            Access-Control-Expose-Headers:
              description: Reverse proxy exposing of custom headers
              required: true
              style: simple
              schema:
                type: string
            X-Count:
              description: Number of result set rows
              style: simple
              schema:
                type: integer
                format: int64
            X-Id:
              description: The subset id
              required: true
              style: simple
              schema:
                type: string
                format: uuid
            X-Headers:
              description: The list of headers separated by comma
              style: simple
              schema:
                type: string
            X-Result-Hash:
              description: Hash of result set
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                type: string
            text/csv: {}
        '400':
          description: Invalid pagination
        '403':
          description: Not allowed to retrieve subset data
        '404':
          description: >-
            Failed to find database in metadata database or query in query store
            of the data database
        '406':
          description: Failed to format data
        '503':
          description: Failed to communicate with database
      security:
        - bearerAuth: []
        - basicAuth: []
  '/api/v1/database/{databaseId}/grant/{username}':
    get:
      tags:
        - grant-endpoint
      summary: Get grants
      description: Get the grant permissions for a user of a given database.
      operationId: find
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatabaseAccessDto'
        '401':
          description: Not authenticated
        '403':
          description: Not database owner or foreign user
        '404':
          description: Failed to find access
        '409':
          description: Grants malformed
      security:
        - basicAuth: []
        - bearerAuth: []
    head:
      tags:
        - grant-endpoint
      summary: Get grants
      description: Get the grant permissions for a user of a given database.
      operationId: find_1
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatabaseAccessDto'
        '401':
          description: Not authenticated
        '403':
          description: Not database owner or foreign user
        '404':
          description: Failed to find access
        '409':
          description: Grants malformed
      security:
        - basicAuth: []
        - bearerAuth: []
  '/api/v1/database/{databaseId}/subset/{queryId}':
    put:
      tags:
        - subset-endpoint
      summary: Persist subset
      description: Persists a subset with id. Requires role `persist-query`.
      operationId: persist
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: queryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryPersistDto'
        required: true
      responses:
        '202':
          description: Persisted subset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryDto'
        '400':
          description: Malformed select query
        '403':
          description: Not allowed to persist subset
        '404':
          description: >-
            Failed to find database in metadata database or query in query store
            of the data database
        '417':
          description: Failed to persist subset
        '503':
          description: Failed to communicate with database
      security:
        - bearerAuth: []
        - basicAuth: []
  /api/v1/upload:
    post:
      tags:
        - upload-endpoint
      summary: Uploads a multipart file
      description: >-
        Uploads a multipart file to the Storage Service. Requires role
        `upload-file`.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
        required: true
      responses:
        '201':
          description: Uploaded the file
          headers:
            X-S3-Key:
              description: The S3 filename
              required: true
              style: simple
              schema:
                type: string
            Access-Control-Expose-Headers:
              description: Expose `X-S3-Key` custom header
              required: true
              style: simple
              schema:
                type: string
        '204':
          description: File already present
          headers:
            X-S3-Key:
              description: The S3 filename
              required: true
              style: simple
              schema:
                type: string
            Access-Control-Expose-Headers:
              description: Expose `X-S3-Key` custom header
              required: true
              style: simple
              schema:
                type: string
        '503':
          description: Failed to establish connection with the storage service
      security:
        - basicAuth: []
        - bearerAuth: []
  '/api/v1/database/{databaseId}/table/{tableId}/data/import':
    post:
      tags:
        - table-endpoint
      summary: Import dataset
      description: >-
        Imports a dataset in a table. Then update the table statistics. The user
        needs to have at least *WRITE_OWN* access to the associated database
        when importing into a owned table. Otherwise *WRITE_ALL* access in
        needed. Requires role `insert-table-data`.
      operationId: importDataset
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportDto'
        required: true
      responses:
        '202':
          description: Imported dataset successfully
        '400':
          description: Dataset and/or query are malformed
        '403':
          description: Import table dataset not allowed
        '404':
          description: Failed to find table in metadata database
        '503':
          description: Failed to establish connection with the metadata service
      security:
        - basicAuth: []
        - bearerAuth: []
  '/api/v1/database/{databaseId}/subset':
    get:
      tags:
        - subset-endpoint
      summary: Find subsets
      description: >-
        Finds subsets in the query store. When the database schema is marked as
        hidden, the user needs to be authorized, have at least read-access to
        the database. The result can be optionally filtered by setting
        `persisted`. When set to *true*, only persisted queries are returned,
        otherwise only non-persisted queries are returned.
      operationId: list
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: persisted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Found subsets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QueryDto'
        '403':
          description: Not allowed to find subsets
        '404':
          description: >-
            Failed to find database or user in metadata database or query in
            query store of the data database
        '503':
          description: Failed to communicate with database
      security:
        - basicAuth: []
        - bearerAuth: []
    post:
      tags:
        - subset-endpoint
      summary: Create subset
      description: >-
        Creates a subset in the query store of the data database. Can also be
        used without authentication if (and only if) the database is marked as
        public (i.e. when `is_public` = `is_schema_public` is set to `true`).
        Otherwise at least read access is required.
      operationId: create_1
      parameters:
        - name: databaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: timestamp
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubsetDto'
        required: true
      responses:
        '201':
          description: Created subset
          content:
            application/json:
              schema:
                type: string
        '400':
          description: Malformed select query
        '403':
          description: Not allowed to find subset
        '404':
          description: >-
            Failed to find database in metadata database or query in query store
            of the data database
        '406':
          description: Failed to format data
        '417':
          description: Failed to insert query into query store of data database
        '501':
          description: Failed to execute query as it contains non-supported keywords
        '503':
          description: Failed to communicate with database
      security:
        - basicAuth: []
        - bearerAuth: []
  '/api/v1/image/{imageId}/analyse/schema/{key}':
    get:
      tags:
        - analyse-endpoint
      summary: Analyse schema
      description: >-
        Analyses a dataset stored at the Storage Service and attempts to map the
        datatypes, requires role `analyse-datatypes`.
      operationId: analyseDatatypes
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Analysed schema successfully
          content:
            application/json:
              schema:
