          description: The query id
          example: 83ea2326-f8f6-4263-baf8-cdf88a54efc7
        owner:
          $ref: '#/components/schemas/UserBriefDto'
        execution:
          type: string
          format: date-time
          description: The timestamp when the query was executed
          example: '2022-01-01 08:00:00.000000'
        query:
          type: string
          description: The mapped SQL query
          example: SELECT `id` FROM `air_quality`
        type:
          type: string
          description: The query type
          enum:
            - query
            - view
          example: query
        identifiers:
          type: array
          items:
            $ref: '#/components/schemas/IdentifierBriefDto'
        database_id:
          type: string
          format: uuid
          description: The database id
          example: 1a6fb0c0-49c3-4a22-a515-35f7a3dd8e62
        query_normalized:
          type: string
          description: The normalized SQL query as executed
          example: >-
            SELECT `id` FROM `air_quality` FOR SYSTEM_TIME AS OF TIMESTAMP
            '2022-01-01 08:00:00.000000'
        query_hash:
          type: string
          description: The sha256-hash of the mapped query
          example: 17e682f060b5f8e47ea04c5c4855908b0a5ad612022260fe50e11ecb0cc0ab76
        result_hash:
          type: string
          description: The sha256-hash of the result
          example: 17e682f060b5f8e47ea04c5c4855908b0a5ad612022260fe50e11ecb0cc0ab76
        result_number:
          type: integer
          format: int64
          description: The row count of the result
          example: 1
        is_persisted:
          type: boolean
          description: 'If false, the query is marked for deletion at a later point in time'
          example: true
      required:
        - database_id
        - execution
        - id
        - identifiers
        - is_persisted
        - owner
        - query
        - query_hash
        - query_normalized
    TupleDto:
      type: object
      properties:
        data:
          type: object
          additionalProperties:
            type: object
          description: The key-value data map
          example:
            key: value
      required:
        - data
    ImportDto:
      type: object
      properties:
        location:
          type: string
          description: The key of the S3 binary object in the storage service
          example: file.csv
        header:
          type: boolean
          description: >-
            If true, the first line contains the column names, otherwise it
            contains only data
          example: true
        separator:
          type: string
          description: The column delimiter of the dataset
          example: ','
        quote:
          type: string
          description: The quote symbol around values in the dataset
          example: '"'
        line_termination:
          type: string
          description: The newline symbol
          example: \n
      required:
        - header
        - location
        - separator
    FilterDto:
      type: object
      properties:
        type:
          type: string
          description: The filter type
          enum:
            - where
            - or
            - and
          example: where
        value:
          type: string
          description: The filter value
          example: 1
        column_id:
          type: string
          format: uuid
          description: The column id
          example: 14128033-54b5-4818-a489-21b0dded86e2
        operator_id:
          type: string
          format: uuid
          description: The operator id
          example: 67c5b54d-2eb0-4f42-8dc1-a504562e9f32
      required:
        - column_id
        - operator_id
        - type
    OrderDto:
      type: object
      properties:
        direction:
          type: string
          description: The sort direction
          enum:
            - asc
            - desc
          example: asc
        column_id:
          type: string
          format: uuid
          description: The column id
          example: e891ba86-0258-41a6-a8d9-ff58bc10b618
      required:
        - column_id
    SubsetDto:
      type: object
      properties:
        columns:
          type: array
          description: The id(s) of the column(s)
          example:
            - e891ba86-0258-41a6-a8d9-ff58bc10b618
          items:
            type: string
            format: uuid
        filter:
          type: array
          items:
            $ref: '#/components/schemas/FilterDto'
