name: Docs

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Weekly link-rot sweep (Mondays 06:00 UTC) per D-02
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to fetch (overrides auto-resolved v<docs_version>.x)'
        required: false
        type: string
        default: ''
      release_repo:
        description: 'Source repo in OWNER/REPO format'
        required: false
        type: string
        default: 'DBRepo-Project/dbrepo'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Pitfall 5: inputs context is empty on push/PR triggers; coerce defaults
      # so push/PR builds do not pass empty unhandled values to the fetch script.
      INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
      INPUT_RELEASE_REPO: ${{ inputs.release_repo || 'DBRepo-Project/dbrepo' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch release artifacts
        env:
          # D-15: use the auto-provided GITHUB_TOKEN for gh release access (no
          # secret). Token is scoped to step env only; never printed or logged.
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ env.INPUT_RELEASE_REPO }}
          RELEASE_TAG_OVERRIDE: ${{ env.INPUT_RELEASE_TAG }}
          DOC_VERSION: '1.13'
        run: bash scripts/fetch-artifacts.sh

      - name: Verify tools
        run: |
          which zensical
          which mike

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Strict pre-deploy build gate
        run: zensical build --strict

      - name: Deploy with mike
        run: mike deploy --push --update-aliases 1.13 latest

      - name: Set default version
        run: mike set-default --push latest

  build-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # D-21: PR build-check exercises the full fetch+fallback flow on every PR.
      INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
      INPUT_RELEASE_REPO: ${{ inputs.release_repo || 'DBRepo-Project/dbrepo' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ env.INPUT_RELEASE_REPO }}
          RELEASE_TAG_OVERRIDE: ${{ env.INPUT_RELEASE_TAG }}
          DOC_VERSION: '1.13'
        run: bash scripts/fetch-artifacts.sh

      - name: Build site
        run: zensical build --strict

  link-check:
    # VER-01 / D-01/D-02: dual-trigger lychee job.
    # PR runs fail the CI on new broken external links; weekly schedule runs
    # report-only and open an issue so transient 5xx/DNS hiccups don't block deploys.
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: zensical build --strict

      - name: Determine lychee inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "fail=true"  >> "$GITHUB_OUTPUT"
          else
            echo "fail=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lychee external link check
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: ${{ steps.inputs.outputs.fail }}
          args: >-
            site/
            --exclude-path site/dev/changelog
            --exclude 'gitlab\.phaidra\.org'
            --max-concurrency 16
            --no-progress
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create issue from weekly report
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Weekly link-check report
          content-filepath: ./lychee/out.md
          labels: automated, link-rot

  dry-run:
    # D-19/D-20: manual-trigger dry-run validates fetch + zensical build without
    # deploying. Proves fetched (or frozen-fallback) artifacts produce a valid
    # site end-to-end. Runs only on workflow_dispatch.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
      INPUT_RELEASE_REPO: ${{ inputs.release_repo || 'DBRepo-Project/dbrepo' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ env.INPUT_RELEASE_REPO }}
          RELEASE_TAG_OVERRIDE: ${{ env.INPUT_RELEASE_TAG }}
          DOC_VERSION: '1.13'
        run: bash scripts/fetch-artifacts.sh

      - name: Build site
        run: zensical build --strict
