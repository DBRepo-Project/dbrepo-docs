  "components": {
    "schemas": {
      "DatabaseAccessDto": {
        "type": "object",
        "properties": {
          "user": {
            "$ref": "#/components/schemas/UserBriefDto"
          },
          "type": {
            "type": "string",
            "enum": [
              "read",
              "write_own",
              "write_all"
