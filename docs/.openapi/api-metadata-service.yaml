          },
          {
            "basicAuth": []
          }
        ]
      }
    },
    "/api/ontology/{ontologyId}": {
      "get": {
        "tags": [
          "ontology-endpoint"
        ],
        "summary": "Find ontology",
        "description": "Finds an ontology with id in the metadata database.",
        "operationId": "find_4",
        "parameters": [
          {
            "name": "ontologyId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
